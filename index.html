<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FranRename — Smart OCR File Renamer</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="windows-theme">
  <!-- Custom Windows-style Titlebar -->
  <div data-tauri-drag-region class="titlebar">
    <div class="titlebar-logo">
      <span class="logo-icon">✨</span>
      <span class="logo-text">FranRename</span>
    </div>
    <div class="window-controls">
      <div class="window-control" id="titlebar-minimize">
        <svg width="10" height="1" viewBox="0 0 10 1" fill="none"><rect width="10" height="1" fill="white"/></svg>
      </div>
      <div class="window-control" id="titlebar-maximize">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="0.5" y="0.5" width="9" height="9" stroke="white"/></svg>
      </div>
      <div class="window-control close" id="titlebar-close">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1L9 9M9 1L1 9" stroke="white" stroke-width="1.2"/></svg>
      </div>
    </div>
  </div>

  <div class="app-layout">
    <main class="content-area">
      <!-- Interaction Zone -->
      <div class="dropzone-container">
        <div class="dropzone" id="drop-zone">
          <div id="drop-msg">
            <div class="icon-orb">📂</div>
            <h2>Drag photos to rename</h2>
            <p>Smartly detect text and organize your files.</p>
          </div>
          
          <div id="canvas-container" class="canvas-wrapper" style="display: none;">
            <canvas id="crop-canvas"></canvas>
            <div class="canvas-overlay-hints">Drag to select OCR area</div>
          </div>
        </div>
      </div>

      <!-- Result Banner (Optional) -->
      <div class="status-banner" id="status">
        <span class="pulse-icon"></span>
        <span id="status-text">Ready for your files</span>
      </div>
    </main>

    <!-- Right: File Manager Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h3>Queue</h3>
        <span class="badge" id="file-count">0 files</span>
      </div>
      <div class="file-list" id="file-list">
        <div class="empty-state">
          <p>Drop images to start</p>
        </div>
      </div>
      <div class="sidebar-footer">
        <button class="btn secondary" id="clear-btn">Clear</button>
        <button class="btn primary" id="process-btn">
          <span>Rename All</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </aside>
  </div>

  <script src="/main.js" type="module"></script>
</body>
</html>

name: Build Windows EXE and Deploy to Telegram

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Dependencies
      run: |
        npm install --force

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Build Sidecar
      run: |
        pip install pyinstaller easyocr requests pillow
        pyinstaller --onefile sidecar/main.py --name ocr-engine-x86_64-pc-windows-msvc
        if not exist src-tauri\bin mkdir src-tauri\bin
        move dist\ocr-engine-x86_64-pc-windows-msvc.exe src-tauri\bin\

    - name: Build Tauri App
      run: |
        if exist src-tauri\bin\ocr-engine-x86_64-pc-windows-msvc.exe (echo Sidecar Found!) else (echo Sidecar MISSING! && exit 1)
        npm run tauri build -- --verbose > tauri_build_error.log 2>&1

    - name: Send Error Log to Telegram if Failed
      if: failure()
      env:
        TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
      shell: bash
      run: |
        python scripts/send_log_to_telegram.py

    - name: Send File to Telegram if Success
      if: success()
      env:
        TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
      shell: bash
      run: |
        python scripts/deploy_to_telegram.py
# V21.1 Shell Force CMD 🎯

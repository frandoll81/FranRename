name: Build Windows EXE and Deploy to Telegram

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Dependencies
      run: |
        npm install --force

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Build Sidecar
      run: |
        pip install pyinstaller easyocr requests pillow
        pyinstaller --onefile sidecar/main.py --name ocr-engine-x86_64-pc-windows-msvc
        mkdir src-tauri/bin
        move dist/ocr-engine-x86_64-pc-windows-msvc.exe src-tauri/bin/

    - name: Build Tauri App
      run: |
        powershell -Command "if (Test-Path \"src-tauri/bin/ocr-engine-x86_64-pc-windows-msvc.exe\") { echo \"Sidecar Found!\" } else { echo \"Sidecar MISSING!\"; exit 1 }"
        npm run tauri build -- --verbose > tauri_build_error.log 2>&1

    - name: Commit Error Log if Failed
      if: failure()
      run: |
        git config --local user.email "error@github.com"
        git config --local user.name "Error Logger"
        git add tauri_build_error.log
        git commit -m "DEBUG: Log Build Error"
        git push origin main
      continue-on-error: true

    - name: Send File to Telegram
      env:
        TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
      run: |
        python scripts/deploy_to_telegram.py
